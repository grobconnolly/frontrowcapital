    <!-- Homepage cinematic hero -->
    <style>
      .home-stage{
        position: relative;
        min-height: 100vh;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--navy);
      }
      .home-stage::before{
        content: '';
        position: absolute;
        inset: 0;
        z-index: 0;
        background: url('stadium.jpg') center/cover no-repeat;
        transform: scale(1.06);
        animation: heroZoom 26s ease-out forwards;
      }
      .home-stage::after{
        content: '';
        position: absolute;
        inset: 0;
        z-index: 1;
        background: linear-gradient(to bottom, rgba(13,29,53,0.58), rgba(13,29,53,0.82));
      }
      .home-stage > *{ position: relative; z-index: 2; }
      .home-stage > header{ z-index: 1000; }
      @keyframes heroZoom{
        from{ transform: scale(1.06); }
        to{ transform: scale(1.16); }
      }
      .home-hero{
        flex: 1 1 auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 44px 0 128px;
      }
      .home-hero__inner .mt-4{ margin-top: 56px !important; }
      .home-hero__inner{
        max-width: 820px;
        animation: heroRise 0.9s ease-out both;
      }
      .home-hero__logo{
        width: min(540px, 82vw);
        height: auto;
        display: block;
        margin: 0 auto;
      }
      .home-hero__explore{
        text-transform: uppercase;
        font-weight: 600;
        letter-spacing: 0.16em;
        font-size: 14px;
        padding: 12px 28px;
        transition: background-color .25s ease, color .25s ease;
      }
      .home-hero a.home-hero__explore{
        background: rgba(255,255,255,0.75);
        border-color: rgba(255,255,255,0.75);
        color: var(--navy);
      }
      .home-hero a.home-hero__explore:hover{
        background: #fff;
        border-color: #fff;
        color: var(--navy);
        box-shadow: none;
        transform: none;
      }
      @keyframes heroRise{
        from{ opacity: 0; transform: translateY(16px); }
        to{ opacity: 1; transform: translateY(0); }
      }
      @media (prefers-reduced-motion: reduce){
        .home-stage::before{ animation: none; transform: scale(1.06); }
        .home-hero__inner{ animation: none; }
      }
      @media (max-width: 600px){
        .home-stage::before{ background-position: center 42%; }
      }
      .home-hero .hero-eyebrow{ color: rgba(255,255,255,0.72); margin-bottom: 30px; }
      .home-hero .hero-title{ color: #fff; text-shadow: 0 2px 40px rgba(0,0,0,0.45); }
      .home-hero .hero-title-line2{ color: rgba(255,255,255,0.92); }
      .home-hero .hero-subtitle{ color: rgba(255,255,255,0.88); margin-top: 44px; letter-spacing: 0.04em; }
      .home-hero .terms-strip{
        color: rgba(255,255,255,0.78);
        border-top-color: rgba(255,255,255,0.22);
        justify-content: center;
      }
      .home-hero .terms-strip b{ color: #fff; }
      .home-hero .btn-fr-solid{ background: #fff; border-color: #fff; color: var(--navy); }
      .home-hero .btn-fr-solid:hover{ background: rgba(255,255,255,0.88); border-color: rgba(255,255,255,0.88); color: var(--navy); }
      .home-hero .btn-fr-outline{ background: transparent; border-color: rgba(255,255,255,0.6); color: #fff; }
      .home-hero .btn-fr-outline:hover{ background: #fff; border-color: #fff; color: var(--navy); }
    </style>

    <script>
      // Mobile menu toggle
      const menuToggle = document.querySelector('.mobile-menu-toggle');
      const mobileNav = document.querySelector('.mobile-nav');
      
      menuToggle.addEventListener('click', function() {
        const isOpen = this.classList.toggle('active');
        mobileNav.classList.toggle('active');
        this.setAttribute('aria-expanded', isOpen);
        
        // Prevent body scroll when menu is open
        document.body.style.overflow = isOpen ? 'hidden' : '';
      });

      // Close menu when clicking outside
      document.addEventListener('click', function(e) {
        if (!e.target.closest('header')) {
          menuToggle.classList.remove('active');
          mobileNav.classList.remove('active');
          menuToggle.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        }
      });

      // Close menu on escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && mobileNav.classList.contains('active')) {
          menuToggle.classList.remove('active');
          mobileNav.classList.remove('active');
          menuToggle.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        }
      });
    </script>
