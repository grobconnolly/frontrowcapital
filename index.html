<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Front Row Capital Partners</title>
    
    <!-- Meta Tags -->
    <meta name="description" content="Front Row Capital Partners - Investing in the future of sports">
    <meta property="og:title" content="Front Row Capital Partners">
    <meta property="og:description" content="Investing in the future of sports">
    <meta name="theme-color" content="#051a0f">

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- Custom -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="frcp-body">
    <!-- Background -->
    <div class="bg-layer"></div>
    <div class="bg-dots"></div>
    <div class="bg-vignette"></div>

    <!-- Header -->
    <header class="py-3">
      <div class="container frcp-container d-flex align-items-center justify-content-between">
        <a href="index.html" class="brand-link">
          <span class="brand-mark"></span>
          <span class="brand-text">Front Row Capital Partners</span>
        </a>

        <!-- Desktop Navigation -->
        <nav class="desktop-nav d-none d-md-flex gap-2">
          <a href="about.html" class="btn btn-fr-outline btn-sm px-3">Who we are</a>
          <a
            href="https://calendar.app.google/NRANbThRLkDjKuPi8"
            target="_blank"
            rel="noopener"
            class="btn btn-fr-solid btn-sm px-3"
          >
            Book a meeting
          </a>
        </nav>

        <!-- Mobile Menu Toggle -->
        <button class="mobile-menu-toggle d-md-none" aria-label="Toggle menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <!-- Mobile Navigation -->
      <div class="mobile-nav">
        <div class="container frcp-container">
          <a href="about.html" class="btn btn-fr-outline btn-lg w-100 mb-3">Who we are</a>
          <a
            href="https://calendar.app.google/NRANbThRLkDjKuPi8"
            target="_blank"
            rel="noopener"
            class="btn btn-fr-solid btn-lg w-100"
          >
            Book a meeting
          </a>
        </div>
      </div>
    </header>

    <!-- Hero -->
    <main class="min-vh-100 d-flex align-items-center py-5">
      <div class="container frcp-container">
        <div class="text-center mx-auto hero-min">
          <div class="accent-line mx-auto mb-3"></div>
          <h1 class="hero-title mb-2">Front Row Capital Partners</h1>
          <p class="hero-subtitle mb-4">Investing in the future of sports.</p>

          <div class="d-grid gap-3 d-md-flex justify-content-md-center">
            <a href="about.html" class="btn btn-fr-outline btn-lg px-4">
              Who we are
            </a>
            <a
              href="https://calendar.app.google/NRANbThRLkDjKuPi8"
              target="_blank"
              rel="noopener"
              class="btn btn-fr-solid btn-lg px-4"
            >
              Book a meeting
            </a>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="py-3 text-center footer-text">
      <div class="container frcp-container">
        <small>&copy; 2026 Front Row Capital Partners. All rights reserved.</small>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      // Mobile menu toggle
      const menuToggle = document.querySelector('.mobile-menu-toggle');
      const mobileNav = document.querySelector('.mobile-nav');
      
      menuToggle.addEventListener('click', function() {
        const isOpen = this.classList.toggle('active');
        mobileNav.classList.toggle('active');
        this.setAttribute('aria-expanded', isOpen);
        
        // Prevent body scroll when menu is open
        document.body.style.overflow = isOpen ? 'hidden' : '';
      });

      // Close menu when clicking outside
      document.addEventListener('click', function(e) {
        if (!e.target.closest('header')) {
          menuToggle.classList.remove('active');
          mobileNav.classList.remove('active');
          menuToggle.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        }
      });

      // Close menu on escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && mobileNav.classList.contains('active')) {
          menuToggle.classList.remove('active');
          mobileNav.classList.remove('active');
          menuToggle.setAttribute('aria-expanded', 'false');
          document.body.style.overflow = '';
        }
      });
    </script>
  </body>
</html>
